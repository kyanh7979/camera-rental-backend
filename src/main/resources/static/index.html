<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Rental</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }

    /* ========== HEADER / NAVBAR ========== */
    .navbar {
      background: #1f2937;
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .navbar-brand {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ========== AUTH BUTTONS ========== */
    .btn-auth {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .2s;
    }
    .btn-login {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
    }
    .btn-login:hover {
      background: rgba(255,255,255,.1);
    }
    .btn-register {
      background: #2563eb;
      color: #fff;
    }
    .btn-register:hover {
      background: #1d4ed8;
    }

    /* ========== USER MENU ========== */
    .user-menu-wrapper {
      position: relative;
    }
    .user-avatar-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #374151;
      border: 2px solid rgba(255,255,255,.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
      overflow: hidden;
    }
    .user-avatar-btn:hover {
      border-color: #2563eb;
    }
    .user-avatar-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .user-avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #4b5563;
      border-radius: 50%;
    }
    .user-avatar-placeholder svg {
      width: 22px;
      height: 22px;
      fill: #d1d5db;
    }

    /* ========== USER DROPDOWN ========== */
    .user-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,.18);
      display: none;
      overflow: hidden;
      z-index: 200;
    }
    .user-dropdown.active {
      display: block;
    }

    /* User info section */
    .user-info-header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 16px;
      text-align: center;
    }
    .user-avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,.5);
      margin: 0 auto 8px;
      overflow: hidden;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-avatar-large svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }
    .user-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .user-email {
      font-size: 13px;
      opacity: .85;
    }
    .user-role {
      display: inline-block;
      background: rgba(255,255,255,.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 6px;
    }

    /* User menu items */
    .user-menu-list {
      padding: 8px 0;
    }
    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .user-menu-item:hover {
      background: #f3f4f6;
    }
    .user-menu-item svg {
      width: 18px;
      height: 18px;
      fill: #6b7280;
    }
    .user-menu-item.logout {
      color: #dc2626;
      border-top: 1px solid #e5e7eb;
      margin-top: 4px;
      padding-top: 12px;
    }
    .user-menu-item.logout svg {
      fill: #dc2626;
    }

    /* ========== MODAL ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 20px 24px;
      text-align: center;
      position: relative;
    }
    .modal-header h2 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .modal-header p {
      font-size: 13px;
      opacity: .85;
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,.2);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover {
      background: rgba(255,255,255,.3);
    }
    .modal-body {
      padding: 24px;
    }
    .form-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
    }
    .form-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }
    .form-tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-submit:hover {
      background: #1d4ed8;
    }
    .btn-submit:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .form-message {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .form-message.error {
      display: block;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .form-message.success {
      display: block;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    .form-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
    }
    .form-footer a {
      color: #2563eb;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }

    /* ========== MAIN CONTENT ========== */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .welcome-banner {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      margin-bottom: 24px;
    }
    .welcome-banner h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .welcome-banner p {
      opacity: .9;
      font-size: 16px;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all .3s;
      z-index: 9999;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    /* ========== LOADING SPINNER ========== */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar">
  <a href="#" class="navbar-brand">Camera Rental</a>
  <div class="navbar-actions">

    <!-- Guest: Login & Register buttons -->
    <div id="authButtons" class="navbar-actions">
      <button class="btn-auth btn-login" onclick="openModal('login')">Dang Nhap</button>
      <button class="btn-auth btn-register" onclick="openModal('register')">Dang Ky</button>
    </div>

    <!-- Logged in: Avatar button -->
    <div id="userMenuWrapper" class="user-menu-wrapper" style="display:none;">
      <button class="user-avatar-btn" id="avatarBtn" onclick="toggleUserDropdown()">
        <div class="user-avatar-placeholder">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
      </button>

      <!-- User Dropdown -->
      <div class="user-dropdown" id="userDropdown">
        <div class="user-info-header">
          <div class="user-avatar-large" id="avatarLarge">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </div>
          <div class="user-name" id="displayName">-</div>
          <div class="user-email" id="displayEmail">-</div>
          <div class="user-role" id="displayRole">-</div>
        </div>
        <div class="user-menu-list">
          <div class="user-menu-item" onclick="showToast('Chuc nang dang phat trien!')">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-7-2h2v-4h4v-2h-4V7h-2v4H8v2h4z"/></svg>
            Don hang cua toi
          </div>
          <div class="user-menu-item" onclick="showToast('Chuc nang dang phat trien!')">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            Cai dat
          </div>
          <div class="user-menu-item logout" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            Dang xuat
          </div>
        </div>
      </div>
    </div>

  </div>
</nav>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content">
  <div class="welcome-banner">
    <h1>Chao mung den Camera Rental</h1>
    <p>Thue may anh chuyen nghiep voi gia tot nhat</p>
  </div>
</div>

<!-- ========== LOGIN MODAL ========== -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('login')">&times;</button>
      <h2>Dang Nhap</h2>
      <p>Truy cap vao tai khoan cua ban</p>
    </div>
    <div class="modal-body">
      <div class="form-message" id="loginMsg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label>Mat khau</label>
        <input type="password" id="loginPassword" placeholder="******" required>
      </div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">Dang Nhap</button>
      <div class="form-footer">
        Chua co tai khoan? <a onclick="switchToRegister()">Dang ky ngay</a>
      </div>
    </div>
  </div>
</div>

<!-- ========== REGISTER MODAL ========== -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('register')">&times;</button>
      <h2>Dang Ky</h2>
      <p>Tao tai khoan moi</p>
    </div>
    <div class="modal-body">
      <div class="form-message" id="registerMsg"></div>
      <div class="form-group">
        <label>Ho va Ten *</label>
        <input type="text" id="regFullName" placeholder="Nguyen Van A" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="regEmail" placeholder="email@example.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mat khau *</label>
          <input type="password" id="regPassword" placeholder="******" required>
        </div>
        <div class="form-group">
          <label>Xac nhan mat khau *</label>
          <input type="password" id="regConfirmPassword" placeholder="******" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>So dien thoai</label>
          <input type="tel" id="regPhone" placeholder="0912 345 678">
        </div>
        <div class="form-group">
          <label>Dia chi</label>
          <input type="text" id="regAddress" placeholder="TP.HCM">
        </div>
      </div>
      <button class="btn-submit" id="registerBtn" onclick="doRegister()">Tao Tai Khoan</button>
      <div class="form-footer">
        Da co tai khoan? <a onclick="switchToLogin()">Dang nhap</a>
      </div>
    </div>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>

<script>
  /* ========== STATE ========== */
  const TOKEN_KEY = 'auth_token';
  const USER_KEY  = 'auth_user';
  let currentTab = 'login';

  /* ========== HELPERS ========== */
  function getToken() {
    return localStorage.getItem(TOKEN_KEY);
  }
  function getUser() {
    const data = localStorage.getItem(USER_KEY);
    return data ? JSON.parse(data) : null;
  }

  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function setLoading(btn, loading) {
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Dang xu ly...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.originalText || btn.textContent;
    }
  }

  /* ========== UI INIT ========== */
  function initUI() {
    const user = getUser();
    if (user && getToken()) {
      showUserMenu(user);
    } else {
      showAuthButtons();
    }
  }

  function showAuthButtons() {
    document.getElementById('authButtons').style.display = '';
    document.getElementById('userMenuWrapper').style.display = 'none';
  }

  function showUserMenu(user) {
    document.getElementById('authButtons').style.display = 'none';
    document.getElementById('userMenuWrapper').style.display = '';

    // Update display
    document.getElementById('displayName').textContent  = user.fullName || 'User';
    document.getElementById('displayEmail').textContent = user.email || '';
    document.getElementById('displayRole').textContent  = user.role === 'ROLE_ADMIN' ? 'Quan tri vien' : 'Khach hang';

    // Avatar
    const avatarLarge = document.getElementById('avatarLarge');
    if (user.avatar) {
      avatarLarge.innerHTML = '<img src="' + user.avatar + '" alt="avatar">';
    } else {
      avatarLarge.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
    }

    // Small avatar button
    const avatarBtn = document.getElementById('avatarBtn');
    if (user.avatar) {
      avatarBtn.innerHTML = '<img src="' + user.avatar + '" alt="avatar">';
    }
  }

  /* ========== MODAL ========== */
  function openModal(tab) {
    currentTab = tab;
    if (tab === 'login') {
      document.getElementById('loginModal').classList.add('active');
    } else {
      document.getElementById('registerModal').classList.add('active');
    }
    clearMessages();
  }

  function closeModal(tab) {
    if (tab === 'login') {
      document.getElementById('loginModal').classList.remove('active');
    } else {
      document.getElementById('registerModal').classList.remove('active');
    }
    clearMessages();
  }

  function switchToLogin() {
    closeModal('register');
    openModal('login');
  }

  function switchToRegister() {
    closeModal('login');
    openModal('register');
  }

  function clearMessages() {
    document.getElementById('loginMsg').className = 'form-message';
    document.getElementById('loginMsg').textContent = '';
    document.getElementById('registerMsg').className = 'form-message';
    document.getElementById('registerMsg').textContent = '';
  }

  function showFormMessage(msgEl, message, type) {
    msgEl.textContent = message;
    msgEl.className = 'form-message ' + type;
  }

  // Close modal on overlay click
  document.getElementById('loginModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('login');
  });
  document.getElementById('registerModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('register');
  });

  /* ========== USER DROPDOWN ========== */
  function toggleUserDropdown() {
    const dd = document.getElementById('userDropdown');
    dd.classList.toggle('active');
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    const wrapper = document.getElementById('userMenuWrapper');
    if (!wrapper.contains(e.target)) {
      document.getElementById('userDropdown').classList.remove('active');
    }
  });

  /* ========== LOGIN ========== */
  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msgEl    = document.getElementById('loginMsg');
    const btn      = document.getElementById('loginBtn');
    btn.dataset.originalText = btn.innerHTML;

    if (!email || !password) {
      showFormMessage(msgEl, 'Vui long nhap day du email va mat khau.', 'error');
      return;
    }

    setLoading(btn, true);
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.message || 'Dang nhap that bai.');
      }

      const { token, user } = data.data;
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.setItem(USER_KEY, JSON.stringify(user));

      closeModal('login');
      showUserMenu(user);
      showToast('Dang nhap thanh cong! Xin chao ' + (user.fullName || user.email), 'success');

    } catch (err) {
      showFormMessage(msgEl, err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  }

  /* ========== REGISTER ========== */
  async function doRegister() {
    const fullName    = document.getElementById('regFullName').value.trim();
    const email       = document.getElementById('regEmail').value.trim();
    const password    = document.getElementById('regPassword').value;
    const confirmPw   = document.getElementById('regConfirmPassword').value;
    const phone       = document.getElementById('regPhone').value.trim();
    const address     = document.getElementById('regAddress').value.trim();
    const msgEl       = document.getElementById('registerMsg');
    const btn         = document.getElementById('registerBtn');
    btn.dataset.originalText = btn.innerHTML;

    if (!fullName || !email || !password) {
      showFormMessage(msgEl, 'Vui long dien day du thong tin bat buoc.', 'error');
      return;
    }
    if (password !== confirmPw) {
      showFormMessage(msgEl, 'Mat khau xac nhan khong khop.', 'error');
      return;
    }
    if (password.length < 6) {
      showFormMessage(msgEl, 'Mat khau phai co it nhat 6 ky tu.', 'error');
      return;
    }

    setLoading(btn, true);
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password, phone: phone || null, address: address || null })
      });
      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.message || 'Dang ky that bai.');
      }

      closeModal('register');
      showToast('Dang ky thanh cong! Vui long dang nhap.', 'success');
      setTimeout(() => openModal('login'), 800);

    } catch (err) {
      showFormMessage(msgEl, err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  }

  /* ========== LOGOUT ========== */
  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    document.getElementById('userDropdown').classList.remove('active');
    showAuthButtons();
    // Reset avatar button
    document.getElementById('avatarBtn').innerHTML = '<div class="user-avatar-placeholder"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>';
    showToast('Da dang xuat.', 'success');
  }

  /* ========== FETCH WITH AUTH ========== */
  async function authFetch(url, options = {}) {
    const token = getToken();
    if (!token) throw new Error('Chua dang nhap.');
    options.headers = {
      ...options.headers,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    };
    const res = await fetch(url, options);
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.message || 'Request failed.');
    return data;
  }

  /* ========== INIT ========== */
  initUI();
</script>
</body>
